<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FraudShield AI - Credit Card Fraud Detection</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#0a0a1a;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(99,102,241,.15) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(168,85,247,.1) 0%,transparent 60%);pointer-events:none;z-index:0}

/* Glass */
.glass{background:rgba(255,255,255,.06);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:16px}
.glass:hover{background:rgba(255,255,255,.09);border-color:rgba(99,102,241,.4);transform:translateY(-2px);transition:.3s}
.glass-card{background:rgba(255,255,255,.05);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;transition:.3s}
.glass-sidebar{background:rgba(10,10,26,.85);backdrop-filter:blur(20px);border-right:1px solid rgba(255,255,255,.08)}
.glass-top{background:rgba(10,10,26,.8);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.08)}
.glass-input{background:rgba(255,255,255,.07)!important;border:1px solid rgba(255,255,255,.12)!important;color:#e2e8f0!important;border-radius:10px!important;font-family:'Poppins',sans-serif}
.glass-input:focus{background:rgba(99,102,241,.12)!important;border-color:rgba(99,102,241,.5)!important;box-shadow:0 0 0 3px rgba(99,102,241,.15)!important;color:#e2e8f0!important}
.glass-input::placeholder{color:#64748b!important}
select.glass-input option{background:#1a1a2e;color:#e2e8f0}

/* Sidebar */
.sidebar{position:fixed;top:0;left:0;bottom:0;width:240px;z-index:1000;display:flex;flex-direction:column;transition:.3s}
.sidebar.collapsed{width:66px}
.brand{display:flex;align-items:center;gap:10px;padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand-icon{width:36px;height:36px;background:linear-gradient(135deg,#6366f1,#a855f7);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem;flex-shrink:0}
.brand-text h6{font-weight:700;font-size:.9rem;margin:0;white-space:nowrap}
.brand-text small{color:#64748b;font-size:.7rem}
.sidebar.collapsed .brand-text,.sidebar.collapsed .menu-label,.sidebar.collapsed .menu-badge,.sidebar.collapsed .sidebar-section{display:none}
.sidebar-menu{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 8px}
.sidebar-section{font-size:.65rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#475569;padding:14px 8px 4px}
.menu-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;color:#94a3b8;text-decoration:none;cursor:pointer;transition:.2s;white-space:nowrap;position:relative}
.menu-item:hover{background:rgba(99,102,241,.15);color:#e2e8f0}
.menu-item.active{background:linear-gradient(135deg,rgba(99,102,241,.3),rgba(168,85,247,.2));color:#fff;border:1px solid rgba(99,102,241,.3)}
.menu-item.active::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:3px;background:#6366f1;border-radius:0 4px 4px 0}
.menu-icon{width:20px;text-align:center;font-size:.95rem;flex-shrink:0}
.menu-label{font-size:.82rem;font-weight:500;flex:1}
.menu-badge{font-size:.62rem;font-weight:600;padding:2px 6px;border-radius:20px;background:rgba(239,68,68,.2);color:#fca5a5}
.badge-live{background:rgba(16,185,129,.2)!important;color:#6ee7b7!important;animation:livePulse 2s infinite}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Topbar */
.topbar{position:fixed;top:0;right:0;height:60px;display:flex;align-items:center;padding:0 20px;gap:10px;z-index:100;transition:.3s}
.topbar{left:240px}
.sidebar.collapsed~.main-content .topbar{left:66px}
.topbar-btn{width:34px;height:34px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:9px;color:#94a3b8;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:.2s;text-decoration:none}
.topbar-btn:hover{background:rgba(99,102,241,.2);border-color:#6366f1;color:#e2e8f0}
.badge-dot{position:absolute;top:-3px;right:-3px;width:15px;height:15px;border-radius:50%;background:#ef4444;font-size:.5rem;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;border:2px solid #0a0a1a}
.topbar-search{flex:1;max-width:400px;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:6px 12px}
.topbar-search input{background:none;border:none;color:#e2e8f0;outline:none;font-size:.82rem;width:100%;font-family:'Poppins',sans-serif}
.topbar-search i{color:#64748b;font-size:.85rem}

/* Main */
.main-content{margin-left:240px;padding-top:60px;min-height:100vh;transition:.3s;position:relative;z-index:1}
.sidebar.collapsed~.main-content{margin-left:66px}
.page-body{padding:20px}

/* Stat cards */
.stat-card{background:rgba(255,255,255,.05);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px;transition:.3s;cursor:default}
.stat-card:hover{transform:translateY(-3px);border-color:rgba(99,102,241,.35);box-shadow:0 0 20px rgba(99,102,241,.2)}
.stat-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.stat-value{font-size:1.6rem;font-weight:700;line-height:1.2}
.stat-label{font-size:.75rem;color:#64748b;font-weight:500}
.stat-trend{font-size:.7rem;font-weight:600;padding:2px 6px;border-radius:20px}
.trend-up{background:rgba(16,185,129,.15);color:#34d399}
.trend-down{background:rgba(239,68,68,.15);color:#f87171}
.prog-bar{height:4px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin-top:10px}
.prog-fill{height:100%;border-radius:4px;transition:width 1.5s ease}

/* Chart wrapper */
.chart-box{background:rgba(255,255,255,.05);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px}
.chart-title{font-size:.88rem;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.chart-wrap{position:relative;width:100%}

/* Table */
.tbl-wrap{background:rgba(255,255,255,.05);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);border-radius:14px;overflow:hidden}
.tbl-head{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.data-table{width:100%;border-collapse:collapse;font-size:.78rem}
.data-table th{padding:10px 14px;background:rgba(255,255,255,.04);color:#64748b;text-align:left;white-space:nowrap;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;cursor:pointer}
.data-table th:hover{color:#e2e8f0}
.data-table td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);color:#94a3b8;white-space:nowrap}
.data-table tr:hover td{background:rgba(255,255,255,.03)}
.badge-status{padding:3px 9px;border-radius:20px;font-size:.68rem;font-weight:600}
.s-genuine{background:rgba(16,185,129,.15);color:#34d399}
.s-fraud{background:rgba(239,68,68,.15);color:#f87171}
.s-pending{background:rgba(245,158,11,.15);color:#fcd34d}
.s-review{background:rgba(59,130,246,.15);color:#93c5fd}

/* Buttons */
.btn-grad{background:linear-gradient(135deg,#6366f1,#a855f7);border:none;color:#fff;font-weight:600;font-family:'Poppins',sans-serif}
.btn-grad:hover{opacity:.9;transform:translateY(-1px);color:#fff;box-shadow:0 0 15px rgba(99,102,241,.4)}
.btn-glass{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#94a3b8;font-family:'Poppins',sans-serif;transition:.2s}
.btn-glass:hover{background:rgba(99,102,241,.2);border-color:rgba(99,102,241,.5);color:#e2e8f0}

/* Toast */
.toast-wrap{position:fixed;top:70px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast-item{background:rgba(10,10,26,.95);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;display:flex;gap:10px;min-width:280px;animation:slideIn .3s ease;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast-item.success{border-left:3px solid #10b981}
.toast-item.danger{border-left:3px solid #ef4444}
.toast-item.info{border-left:3px solid #3b82f6}
.toast-item.warning{border-left:3px solid #f59e0b}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Live dot */
.live-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;animation:blink 1s infinite;display:inline-block}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:#10b981;box-shadow:0 0 6px #10b981;animation:pulse 1.5s infinite;display:inline-block}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.4);opacity:.7}}

/* Misc */
.gradient-text{background:linear-gradient(135deg,#6366f1,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-hidden{display:none!important}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#6366f1;border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.mobile-open{transform:translateX(0)}.main-content{margin-left:0!important}.topbar{left:0!important}.mobile-toggle{display:flex!important}}
.mobile-toggle{display:none}
.risk-bar{width:48px;height:4px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle}
.risk-fill{height:100%;border-radius:4px}
.scroll-top{position:fixed;bottom:20px;right:20px;width:38px;height:38px;background:rgba(99,102,241,.8);border:none;border-radius:50%;color:#fff;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:400;font-size:.9rem}
.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{100%{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar glass-sidebar" id="sidebar">
  <div class="brand">
    <div class="brand-icon"><i class="bi bi-shield-check"></i></div>
    <div class="brand-text"><h6>FraudShield</h6><small>AI Platform</small></div>
    <button onclick="toggleSidebar()" style="background:none;border:none;color:#64748b;margin-left:auto;cursor:pointer;font-size:1rem"><i class="bi bi-layout-sidebar-inset"></i></button>
  </div>
  <div class="sidebar-menu">
    <div class="sidebar-section">Main</div>
    <a class="menu-item active" onclick="showPage('dashboard')"><span class="menu-icon"><i class="bi bi-grid-1x2-fill"></i></span><span class="menu-label">Dashboard</span><span class="menu-badge badge-live">LIVE</span></a>
    <a class="menu-item" onclick="showPage('transactions')"><span class="menu-icon"><i class="bi bi-credit-card-2-front"></i></span><span class="menu-label">Transactions</span><span class="menu-badge">1.2k</span></a>
    <a class="menu-item" onclick="showPage('fraud')"><span class="menu-icon"><i class="bi bi-robot"></i></span><span class="menu-label">Fraud Detection</span></a>
    <a class="menu-item" onclick="showPage('monitoring')"><span class="menu-icon"><i class="bi bi-broadcast"></i></span><span class="menu-label">Live Monitoring</span><span class="menu-badge badge-live">LIVE</span></a>
    <a class="menu-item" onclick="showPage('analytics')"><span class="menu-icon"><i class="bi bi-graph-up-arrow"></i></span><span class="menu-label">Analytics</span></a>
    <div class="sidebar-section">Manage</div>
    <a class="menu-item" onclick="showPage('customers')"><span class="menu-icon"><i class="bi bi-people-fill"></i></span><span class="menu-label">Customers</span></a>
    <a class="menu-item" onclick="showPage('cards')"><span class="menu-icon"><i class="bi bi-credit-card-fill"></i></span><span class="menu-label">Cards</span></a>
    <a class="menu-item" onclick="showPage('reports')"><span class="menu-icon"><i class="bi bi-file-earmark-bar-graph"></i></span><span class="menu-label">Reports</span></a>
    <div class="sidebar-section">System</div>
    <a class="menu-item" onclick="showPage('notifications')"><span class="menu-icon"><i class="bi bi-bell-fill"></i></span><span class="menu-label">Notifications</span><span class="menu-badge">8</span></a>
    <a class="menu-item" onclick="showPage('settings')"><span class="menu-icon"><i class="bi bi-gear-fill"></i></span><span class="menu-label">Settings</span></a>
    <a class="menu-item" onclick="showPage('help')"><span class="menu-icon"><i class="bi bi-question-circle-fill"></i></span><span class="menu-label">Help</span></a>
    <a class="menu-item" onclick="toast('Logged out','See you soon!','info')" style="color:#f87171"><span class="menu-icon"><i class="bi bi-box-arrow-left"></i></span><span class="menu-label">Logout</span></a>
  </div>
  <div style="padding:12px 16px;border-top:1px solid rgba(255,255,255,.07);font-size:.72rem;color:#475569;display:flex;align-items:center;gap:6px">
    <span class="pulse-dot"></span><span>AI Engine Active v3.1.4</span>
  </div>
</nav>

<!-- MAIN -->
<div class="main-content" id="mainContent">
  <!-- TOPBAR -->
  <div class="topbar glass-top" id="topbar">
    <button class="mobile-toggle topbar-btn" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')"><i class="bi bi-list"></i></button>
    <div class="topbar-search">
      <i class="bi bi-search"></i>
      <input type="text" placeholder="Search transactions, customers..." id="globalSearch">
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
      <span id="liveClock" style="font-size:.78rem;color:#94a3b8;white-space:nowrap"></span>
      <button class="topbar-btn" onclick="toggleTheme()" id="themeBtn" title="Toggle Theme"><i class="bi bi-moon-stars-fill"></i></button>
      <div class="position-relative">
        <button class="topbar-btn" onclick="showPage('notifications')"><i class="bi bi-bell-fill"></i><span class="badge-dot">8</span></button>
      </div>
      <div class="dropdown">
        <button class="topbar-btn" data-bs-toggle="dropdown"><i class="bi bi-person-circle"></i></button>
        <ul class="dropdown-menu dropdown-menu-end" style="background:rgba(15,15,30,.97);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:8px">
          <li style="padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:4px"><strong style="font-size:.82rem">Alex Morgan</strong><br><small style="color:#64748b">alex@fraudshield.ai</small></li>
          <li><a class="dropdown-item" style="color:#94a3b8;border-radius:8px;font-size:.82rem" onclick="showPage('settings')"><i class="bi bi-gear me-2"></i>Settings</a></li>
          <li><a class="dropdown-item" style="color:#f87171;border-radius:8px;font-size:.82rem" onclick="toast('Logged out','Goodbye!','info')"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
        </ul>
      </div>
    </div>
  </div>

  <!-- PAGE CONTENT -->
  <div class="page-body" id="pageBody"></div>
</div>

<!-- Scroll Top -->
<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="bi bi-arrow-up"></i></button>

<!-- Toast Container -->
<div class="toast-wrap" id="toastWrap"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>

/* ============================================================
   CORE UTILITIES
============================================================ */
// Toast
function toast(title,msg,type='info'){
  const icons={success:'bi-check-circle-fill',danger:'bi-x-circle-fill',warning:'bi-exclamation-triangle-fill',info:'bi-info-circle-fill'};
  const colors={success:'#10b981',danger:'#ef4444',warning:'#f59e0b',info:'#3b82f6'};
  const el=document.createElement('div');
  el.className=`toast-item ${type}`;
  el.innerHTML=`<i class="bi ${icons[type]}" style="color:${colors[type]};font-size:1.1rem;flex-shrink:0;margin-top:2px"></i><div><div style="font-size:.82rem;font-weight:600;color:#e2e8f0">${title}</div><div style="font-size:.74rem;color:#94a3b8">${msg}</div></div><button onclick="this.parentElement.remove()" style="background:none;border:none;color:#64748b;margin-left:auto;cursor:pointer">×</button>`;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(()=>el.remove(),4500);
}

// Clock
function clock(){const n=new Date();document.getElementById('liveClock').textContent=n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})+' '+n.toLocaleTimeString('en-US',{hour12:true});}
clock();setInterval(clock,1000);

// Theme toggle (simple)
let isDark=true;
function toggleTheme(){
  isDark=!isDark;
  document.body.style.background=isDark?'#0a0a1a':'#f0f4ff';
  document.body.style.color=isDark?'#e2e8f0':'#1e293b';
  document.getElementById('themeBtn').innerHTML=isDark?'<i class="bi bi-moon-stars-fill"></i>':'<i class="bi bi-sun-fill"></i>';
}

// Sidebar toggle
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed');}

// Scroll top
window.addEventListener('scroll',()=>{
  const btn=document.getElementById('scrollTop');
  btn.style.display=window.scrollY>300?'flex':'none';
});

// Random helpers
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rf(a,b){return (Math.random()*(b-a)+a).toFixed(2);}
function maskCard(n){return '•••• •••• •••• '+n.slice(-4);}
function animCount(el,target,dur=1200,pre='',suf=''){
  const t0=performance.now();
  function tick(ts){const p=Math.min((ts-t0)/dur,1),v=Math.floor((1-Math.pow(1-p,3))*target);
    el.textContent=pre+v.toLocaleString()+suf;if(p<1)requestAnimationFrame(tick);
    else el.textContent=pre+target.toLocaleString()+suf;}
  requestAnimationFrame(tick);
}

/* ============================================================
   DUMMY DATA
============================================================ */
const CUSTOMERS=['Emma Johnson','Liam Williams','Olivia Brown','Noah Davis','Sophia Wilson','James Miller','Isabella Moore','Logan Taylor','Mia Anderson','Charlotte Thomas','Ethan Jackson','Ava White','Mason Harris','Amelia Martin','Oliver Martinez'];
const MERCHANTS=['Amazon','Walmart','Apple Store','Netflix','Uber',"McDonald's",'Target','Best Buy','Starbucks','Delta Airlines','Shell Gas','CVS Pharmacy','Home Depot','Nike','PayPal'];
const CATS=['Online Shopping','Retail','ATM Withdrawal','Travel','Dining','Gas & Fuel','Healthcare','Entertainment'];
const CITIES=['New York','Los Angeles','London','Mumbai','Dubai','Lagos','Moscow','São Paulo','Tokyo','Sydney','Paris','Berlin'];
const CTRY=['USA','USA','UK','India','UAE','Nigeria','Russia','Brazil','Japan','Australia','France','Germany'];
const CARDS=['Visa','Mastercard','Amex','Discover'];
const DEVICES=['iPhone 14','Samsung S23','MacBook Pro','Windows PC','Android'];
const BROWSERS=['Chrome','Safari','Firefox','Edge','Samsung Browser'];

const TXNS=Array.from({length:200},(_,i)=>{
  const risk=ri(1,100);
  const ci=ri(0,CITIES.length-1);
  const d=new Date(Date.now()-ri(0,7*86400000));
  return {
    id:'TXN-'+String(10000+i).padStart(5,'0'),
    customer:CUSTOMERS[ri(0,CUSTOMERS.length-1)],
    card:'4'+Array.from({length:15},()=>ri(0,9)).join(''),
    merchant:MERCHANTS[ri(0,MERCHANTS.length-1)],
    cat:CATS[ri(0,CATS.length-1)],
    amount:parseFloat(rf(5,2000)),
    date:d.toLocaleDateString('en-US'),
    time:d.toLocaleTimeString('en-US'),
    city:CITIES[ci],country:CTRY[ci]||'USA',
    device:DEVICES[ri(0,DEVICES.length-1)],
    browser:BROWSERS[ri(0,BROWSERS.length-1)],
    ip:Array.from({length:4},()=>ri(1,254)).join('.'),
    cardType:CARDS[ri(0,CARDS.length-1)],
    risk,
    fraudProb:risk>60?parseFloat((risk*.9).toFixed(1)):parseFloat((risk*.3).toFixed(1)),
    status:risk>75?'Fraud':risk>60?'Review':risk>45?'Pending':'Genuine'
  };
});

function riskColor(s){return s<30?'#10b981':s<60?'#f59e0b':'#ef4444';}
function riskLabel(s){return s<30?'Low':s<60?'Medium':'High';}

/* ============================================================
   PAGE ROUTER
============================================================ */
let liveTimer=null;
function showPage(page){
  clearInterval(liveTimer);
  document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
  const active=document.querySelector(`.menu-item[onclick*="'${page}'"]`);
  if(active)active.classList.add('active');
  const pages={dashboard:pageDashboard,transactions:pageTransactions,fraud:pageFraud,monitoring:pageMonitoring,analytics:pageAnalytics,customers:pageCustomers,cards:pageCards,reports:pageReports,notifications:pageNotifications,settings:pageSettings,help:pageHelp};
  const fn=pages[page];
  if(fn)fn();
}

/* ============================================================
   CHART DEFAULTS
============================================================ */
Chart.defaults.font.family="'Poppins',sans-serif";
Chart.defaults.color='#94a3b8';
Chart.defaults.borderColor='rgba(255,255,255,.06)';
const TT={backgroundColor:'rgba(10,10,26,.95)',borderColor:'rgba(255,255,255,.1)',borderWidth:1,padding:10,cornerRadius:8};
const charts={};
function mkChart(id,cfg){
  if(charts[id]){charts[id].destroy();delete charts[id];}
  const el=document.getElementById(id); if(!el)return;
  charts[id]=new Chart(el,cfg); return charts[id];
}

function gradFill(ctx,c1,c2){
  const g=ctx.createLinearGradient(0,0,0,280);
  g.addColorStop(0,c1);g.addColorStop(1,c2);return g;
}

function filterTx(){
  const q=(document.getElementById('txSearch')?.value||'').toLowerCase();
  const st=document.getElementById('txStat')?.value||'';
  const ct=document.getElementById('txCard')?.value||'';
  const ri=document.getElementById('txRisk')?.value||'';
  txFiltered=TXNS.filter(t=>{
    const mq=!q||[t.id,t.customer,t.merchant,t.cat,t.city,t.country,t.cardType].some(f=>f.toLowerCase().includes(q));
    const ms=!st||t.status===st;
    const mc=!ct||t.cardType===ct;
    const mr=!ri||(ri==='low'&&t.risk<=30)||(ri==='med'&&t.risk>30&&t.risk<=60)||(ri==='high'&&t.risk>60);
    return mq&&ms&&mc&&mr;
  });
  txPage=1; renderTxTable();
  const el=document.getElementById('txCount'); if(el)el.textContent=txFiltered.length;
}

let txSortCol='',txSortDir=1;
function sortTx(col){txSortDir=txSortCol===col?txSortDir*-1:1;txSortCol=col;txFiltered.sort((a,b)=>typeof a[col]==='number'?(a[col]-b[col])*txSortDir:String(a[col]).localeCompare(String(b[col]))*txSortDir);renderTxTable();}

    <td style="color:#64748b">${t.date}</td><td>${t.city}</td>
    <td><span style="background:rgba(59,130,246,.15);color:#93c5fd;padding:2px 8px;border-radius:20px;font-size:.68rem">${t.cardType}</span></td>
    <td><div style="display:flex;align-items:center;gap:5px"><div class="risk-bar"><div class="risk-fill" style="width:${t.risk}%;background:${riskColor(t.risk)}"></div></div><span style="font-size:.7rem;color:${riskColor(t.risk)};font-weight:600">${t.risk}</span></div></td>
    <td><span class="badge-status s-${t.status.toLowerCase()}">${t.status}</span></td>
    <td><button style="background:rgba(99,102,241,.15);border:none;color:#818cf8;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:.7rem" onclick="viewTx('${t.id}')"><i class="bi bi-eye"></i></button></td>
  </tr>`).join('');
  const total=Math.ceil(txFiltered.length/txPageSize);
  const info=document.getElementById('txInfo');if(info)info.textContent=`Showing ${start+1}–${Math.min(start+txPageSize,txFiltered.length)} of ${txFiltered.length}`;

function showFraudResult(){

  if(amt>2000)score+=20;else if(amt>500)score+=10;

          <div style="position:absolute;top:-4px;width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid #0a0a1a;box-shadow:0 2px 6px rgba(0,0,0,.5);left:calc(${score}% - 8px);transition:left .8s ease"></div>

        <span style="background:${isFraud?'rgba(239,68,68,.15)':'rgba(16,185,129,.15)'};color:${isFraud?'#f87171':'#34d399'};border:1px solid ${isFraud?'rgba(239,68,68,.3)':'rgba(16,185,129,.3)'};padding:4px 12px;border-radius:20px;font-size:.74rem;font-weight:600"><i class="bi ${isFraud?'bi-x-circle-fill':'bi-check-circle-fill'} me-1"></i>${isFraud?'FRAUDULENT':'LEGITIMATE'}</span>
        <span style="background:rgba(99,102,241,.15);color:#818cf8;border:1px solid rgba(99,102,241,.3);padding:4px 12px;border-radius:20px;font-size:.74rem;font-weight:600">Risk: ${level}</span>

      <div style="display:flex;gap:8px">

function startLiveFeed(){
  const feed=document.getElementById('liveFeed');

    const f=document.getElementById('liveFeed');if(!f){clearInterval(liveTimer);return;}

    const t=document.getElementById('feedTime');if(t)t.textContent=new Date().toLocaleTimeString();
    for(let i=0;i<4;i++){const el=document.getElementById('al'+i);if(el)el.textContent=ri(2,20);}

}

function addFeedItem(feed,prepend){
  const t=TXNS[ri(0,TXNS.length-1)];
  const cols={Fraud:'#ef4444',Genuine:'#10b981',Pending:'#f59e0b',Review:'#3b82f6'};
  const icons={Fraud:'bi-x-circle-fill',Genuine:'bi-check-circle-fill',Pending:'bi-hourglass',Review:'bi-eye'};
  const col=cols[t.status]||'#6366f1';
  const el=document.createElement('div');
  el.style.cssText=`display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);animation:slideIn .3s ease`;

    </div>`;
  if(prepend&&feed.firstChild){feed.insertBefore(el,feed.firstChild);if(feed.children.length>14)feed.removeChild(feed.lastChild);}
  else feed.appendChild(el);
}
